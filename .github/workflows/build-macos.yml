name: build-macos

# Publishes RoeSnip.App for osx-arm64 and osx-x64. Like build-linux.yml, this only ever touches
# RoeSnip.App (net8.0 TFM) — the sln's frozen WPF app can't build off Windows — and there is no
# macOS-specific test project yet, so this job is publish-only.

on:
  workflow_dispatch: {}
  # Runnable standalone or as part of build-all.yml.
  workflow_call: {}

jobs:
  build:
    name: Publish (${{ matrix.rid }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: osx-arm64
            runner: macos-15
          - rid: osx-x64
            runner: macos-15
          # TODO once a self-hosted Intel Mac is provisioned, swap osx-x64 to it (installer-src
          # convention — see installer-src/.github/workflows/build-all.yml's build-macos matrix,
          # which uses the 'macOS' self-hosted label for x64 and macos-15 only for arm64):
          # - rid: osx-x64
          #   runner: macOS
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Matches TESTING.md's osx-arm64/osx-x64 publish gates exactly.
      - name: Publish RoeSnip.App (${{ matrix.rid }})
        run: dotnet publish src/RoeSnip.App -c Release -f net8.0 -r ${{ matrix.rid }} --self-contained

      # TODO: bundle helpers/scksnap alongside the published binary. scksnap.tar.gz is built
      # separately by .github/workflows/build-scksnap.yml (its own macOS-only Swift toolchain
      # workflow, kept as-is) and, per TESTING.md's macOS deployment note, deploys as a flat
      # sibling next to the RoeSnip executable (ROESNIP_SCKSNAP_PATH overrides the path). Wiring
      # that up here means fetching build-scksnap's artifact across workflows and is deliberately
      # left undone — no signing/notarization pipeline exists yet either.

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoeSnip-${{ matrix.rid }}
          path: src/RoeSnip.App/bin/Release/net8.0/${{ matrix.rid }}/publish/
          if-no-files-found: error
