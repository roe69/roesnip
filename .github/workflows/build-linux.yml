name: build-linux

# Builds and publishes RoeSnip.App for linux-x64. Scoped to the cross-platform slice of the
# solution rather than `dotnet build RoeSnip.sln`: the sln also carries the frozen WPF app
# (src/RoeSnip, net8.0-windows10.0.22621.0, UseWPF) whose XAML compiler only runs on Windows, so a
# whole-solution build fails on this runner. RoeSnip.Core.Tests is the one test project that is
# platform-agnostic today (RoeSnip.Tests and RoeSnip.Platform.Windows.Tests are Windows-only).

on:
  workflow_dispatch: {}
  # Runnable standalone or as part of build-all.yml.
  workflow_call: {}

jobs:
  build:
    name: Build, test, and publish (linux-x64)
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # -f is required: RoeSnip.App multi-targets net8.0 / net8.0-windows10.0.22621.0, and a plain
      # `dotnet build` with no RID would otherwise also attempt the windows TFM's design-time
      # reference to RoeSnip.Platform.Windows (compiles fine cross-platform per TESTING.md, but
      # pointless work on a Linux runner that will only ever publish net8.0).
      - name: Build RoeSnip.App (net8.0)
        run: dotnet build src/RoeSnip.App/RoeSnip.App.csproj -c Release -f net8.0

      # NOTE: RoeSnip.Core.Tests pulls in SkiaSharp.NativeAssets.Win32 (its own comment explains
      # why — it never references Avalonia, so it needs its own native asset). That's a
      # Windows-only native library; any test that actually exercises SkiaSharp decode/encode may
      # fail here until the test project gets a cross-platform native asset. Left as-is per the CI
      # task scope — flagging, not fixing.
      - name: Test RoeSnip.Core
        run: dotnet test tests/RoeSnip.Core.Tests/RoeSnip.Core.Tests.csproj -c Release

      # Matches TESTING.md's linux-x64 publish gate exactly.
      - name: Publish RoeSnip.App (linux-x64)
        run: dotnet publish src/RoeSnip.App -c Release -f net8.0 -r linux-x64 --self-contained

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RoeSnip-linux-x64
          path: src/RoeSnip.App/bin/Release/net8.0/linux-x64/publish/
          if-no-files-found: error
