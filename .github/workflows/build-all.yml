name: build-all

# Orchestrator mirroring installer-src's build-all.yml shape (lint/preflight gate -> per-platform
# builds), adapted to .NET: a quick test gate runs first so a single dispatch fails fast instead
# of spending Windows+Linux+2x-macOS runner minutes on a build that was never going to pass, then
# the three per-platform workflows run in parallel off that gate via workflow_call. Unlike
# installer-src, there is no release/draft-publish step — RoeSnip has no release process yet, so
# this just groups each platform's artifacts under one run for now.

on:
  workflow_dispatch: {}

jobs:
  # The only environment that can build the whole solution: RoeSnip.sln also carries the frozen
  # WPF app (src/RoeSnip, net8.0-windows10.0.22621.0, UseWPF), whose XAML compiler
  # (PresentationBuildTasks) is Windows-only. This duplicates the build+test that build-windows.yml
  # does on its own — intentional: it's the cheapest available "does everything still compile and
  # pass" check, run once before fanning out to Linux and two macOS legs.
  test-gate:
    name: Quick test gate (whole solution)
    runs-on: windows-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build and test
        run: dotnet test RoeSnip.sln -c Release

  build-windows:
    name: Windows
    needs: test-gate
    uses: ./.github/workflows/build-windows.yml

  build-linux:
    name: Linux
    needs: test-gate
    uses: ./.github/workflows/build-linux.yml

  build-macos:
    name: macOS
    needs: test-gate
    uses: ./.github/workflows/build-macos.yml
