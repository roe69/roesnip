name: ci

# Lightweight push/PR gate kept SEPARATE from release.yml: build + test the whole solution on the
# one host that can compile the WPF app (PresentationBuildTasks is Windows-only). This is the fast
# "does it still compile and pass" check; release.yml is only ever run deliberately.
# Note: release.yml pushes its version-bump commit with GITHUB_TOKEN, which does not start new
# workflow runs, so this CI does not run on the bump commit - no wasted run, no loop.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "**/*.props"
      - "RoeSnip.sln"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "**/*.props"
      - "RoeSnip.sln"
      - ".github/workflows/ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build and test (whole solution)
    runs-on: windows-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build solution (Release)
        run: dotnet build RoeSnip.sln -c Release

      - name: Test
        run: dotnet test RoeSnip.sln -c Release --no-build
